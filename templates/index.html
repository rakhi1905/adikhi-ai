<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adikhi AI</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    display: flex;
    height: 100vh;
    font-family: 'Libre Baskerville', serif;
    background: #f5efe6;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    padding: 25px;
    color: #e6d3b3;

    background:
        linear-gradient(rgba(45,31,22,0.85), rgba(45,31,22,0.85)),
        url("/static/coffee-bg.png");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* LOGO */
.logo {
    font-size: 22px;
    opacity: 0.6;
    letter-spacing: 2px;
}

/* HISTORY */
.history {
    margin-top: 20px;
    font-size: 14px;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    background: #3b2a20;
    color: #f1e3c6;
    padding: 18px;
    text-align: center;
    font-size: 28px;   /* BIGGER */
    font-weight: 700;
}

/* CHAT */
.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* MESSAGE */
.message {
    max-width: 70%;
    padding: 12px 15px;
    margin: 10px 0;
    border-radius: 10px;
    animation: fadeIn 0.3s ease;
    line-height: 1.6;
}

/* USER */
.user {
    background: #2d1f16;
    color: #fff;
    margin-left: auto;
}

/* BOT */
.bot {
    background: #e8dcc9;
    color: #2d1f16;
}

/* INPUT AREA */
.input-area {
    display: flex;
    padding: 15px;
}

/* INPUT */
input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    margin-left: 10px;
    padding: 12px 18px;
    background: #3b2a20;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">ADIKHI AI</div>
    <button onclick="newChat()" style="
    margin-top:15px;
    padding:8px;
    width:100%;
    border:none;
    border-radius:6px;
    background:#5a3e2c;
    color:white;
    cursor:pointer;
">
+ New Chat
</button>

    <div class="history" id="historyList"></div>
</div>

<div class="main">

    <div class="header">Business Intelligence Assistant</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="msg" placeholder="Ask about your business..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

/* CHAT STORAGE */
let allChats = JSON.parse(localStorage.getItem("allChats")) || [];
let chatHistory = [];

/* NEW CHAT */
function newChat() {
    let chat = document.getElementById("chat");

    if (chatHistory.length > 0) {
        allChats.push(chatHistory);
        localStorage.setItem("allChats", JSON.stringify(allChats));
    }

    chatHistory = [];
    chat.innerHTML = "";

    loadSidebar();
}

/* LOAD ON START */
window.onload = () => {
    loadSidebar();
};

/* ENTER KEY */
function handleKey(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
}

/* ADD MESSAGE */
function addMessage(text, type) {
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = formatResponse(text);

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* FORMAT */
function formatResponse(text) {
    return text
        .replace(/\n/g, "<br>")
        .replace(/- /g, "<br>• ");
}

/* LOADER */
function createLoader() {
    let div = document.createElement("div");
    div.className = "message bot";
    div.id = "loader";
    div.innerText = "Typing.";

    let dots = 1;
    let interval = setInterval(() => {
        let l = document.getElementById("loader");
        if (!l) return clearInterval(interval);

        l.innerText = "Typing" + ".".repeat(dots);
        dots = dots === 3 ? 1 : dots + 1;
    }, 400);

    return div;
}

/* SEND */
async function sendMessage() {

    let input = document.getElementById("msg");
    let message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");

    chatHistory.push({text: message, type: "user"});

    input.value = "";

    let chat = document.getElementById("chat");

    let loader = createLoader();
    chat.appendChild(loader);

    try {
        let res = await fetch("/api/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: message})
        });

        let data = await res.json();

        document.getElementById("loader")?.remove();

        let reply = data.reply || "⚠ No response";

        let botDiv = document.createElement("div");
        botDiv.className = "message bot";
        chat.appendChild(botDiv);

        botDiv.innerHTML = formatResponse(reply);

        chatHistory.push({text: reply, type: "bot"});

        chat.scrollTop = chat.scrollHeight;

    } catch {
        document.getElementById("loader")?.remove();
        addMessage("⚠ Error connecting", "bot");
    }
}

/* SIDEBAR LOAD */
function loadSidebar() {
    let container = document.getElementById("historyList");
    if (!container) return;

    container.innerHTML = "";

    allChats.forEach((chat, index) => {
        let div = document.createElement("div");

        div.style.padding = "8px";
        div.style.marginTop = "6px";
        div.style.background = "rgba(255,255,255,0.08)";
        div.style.borderRadius = "6px";
        div.style.cursor = "pointer";

        div.innerText = chat[0]?.text.slice(0, 20) || "Chat";

        div.onclick = () => loadChat(index);

        container.appendChild(div);
    });
}

/* LOAD SELECTED CHAT */
function loadChat(index) {
    let chat = document.getElementById("chat");

    chat.innerHTML = "";
    chatHistory = allChats[index];

    chatHistory.forEach(msg => {
        addMessage(msg.text, msg.type);
    });
}

</script>

</body>
</html>
